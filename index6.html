  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

─ Red (error, destructive) ──────────────────────────────── */\n  --red-50:  #FAF0F1;\n  --red-100: #F2E6E8;\n  --red-200: #CE1C12;\n  --red-300: #B8261D;\n  --red-400: #660600;\n  --red-alert: #DB3127;  /* notification dot */\n\n  /* ── Orange (warning) ──────────────────────────────────────── */\n  --orange-50:  #FEF8EE;\n  --orange-100: #F9D8AA;\n  --orange-200: #EC7E23;\n  --orange-300: #B84C16;\n  --orange-900: #763418;\n\n  /* ── Yellow (caution / highlight) ──────────────────────────── */\n  --yellow-50:  #FFF7D6;\n  --yellow-100: #F8E6A0;\n  --yellow-300: #F5CD47;\n  --yellow-400: #E2B203;\n  --yellow-900: #5C4A0A;\n\n  /* ── Gray (neutral) ────────────────────────────────────────── */\n  --gray-50:  #F7F7F8;\n  --gray-100: #EEEEF0;\n  --gray-200: #D9D9DE;\n  --gray-300: #B9B9C0;\n  --gray-400: #92929E;\n  --gray-500: #757582;\n  --gray-600: #5E5E6B;\n  --gray-700: #4D4D57;\n  --gray-800: #42424A;\n  --gray-900: #3A3A40;\n  --gray-950: #1D1D20;\n\n  /* ── NavyGray (brand heading/navy) ─────────────────────────── */\n  --navygray-50:  #DFECF7;\n  --navygray-100: #C8D4DF;\n  --navygray-200: #9BADBE;\n  --navygray-300: #7088A8;\n  --navygray-400: #4A6B91;\n  --navygray-500: #2D527A;\n  --navygray-600: #1A3F64;\n  --navygray-700: #11304F;  /* Body heading color */\n  --navygray-800: #0F2942;\n  --navygray-900: #0D2135;\n  --navygray-950: #0A1A2A;\n\n  /* ── Violet / Indigo (sidebar fill, outgoing agent bubbles) ── */\n  --violet-50:  #F3F1FC;\n  --violet-100: #DDD9EE;\n  --violet-200: #A8A5C5;\n  --violet-300: #76719E;\n  --violet-400: #5C5685;\n  --violet-500: #2D2759;  /* sidebar fill + outgoing chat bubble */\n  --violet-600: #1F1A3E;\n\n  /* Pink / peach highlight — used for selected-row tint */\n  --peach-50: #FFF1EC;\n  --peach-100: #FFE2D7;\n  --peach-200: #F9BEA7;\n\n  /* ── Surface / chrome ──────────────────────────────────────── */\n  --white: #FFFFFF;\n  --black: #000000;\n  --docs-header-teal: #103B3C; /* deep teal, appears with star-glint overlay */\n  --cover-periwinkle: #DFECF7; /* cover background pale blue */\n\n  /* ── SEMANTIC: Background ──────────────────────────────────── */\n  --bg-default:  #FFFFFF;\n  --bg-subtle:   var(--gray-50);\n  --bg-hover:    var(--gray-50);\n  --bg-disabled: var(--gray-200);\n  --bg-error:    var(--red-50);\n  --bg-success:  var(--success-green-50);\n  --bg-warning:  var(--orange-50);\n  --bg-overlay:  rgba(94, 94, 107, 0.40);  /* gray-600 @ 40% */\n\n  /* ── SEMANTIC: Text ────────────────────────────────────────── */\n  --text-heading:   var(--navygray-700);\n  --text-body:      var(--gray-700);\n  --text-subtext:   var(--gray-600);\n  --text-disabled:  var(--gray-400);\n  --text-inverse:   #FFFFFF;\n  --text-error:     var(--red-200);\n  --text-success:   var(--success-green-300);\n  --text-warning:   var(--yellow-900);\n  --text-link:      var(--blue-300);\n\n  /* ── SEMANTIC: Borders/Outlines ────────────────────────────── */\n  --border-default:  var(--gray-200);\n  --border-subtle:   var(--gray-100);\n  --border-hover:    var(--gray-300);\n  --border-focused:  var(--navygray-300);\n  --border-disabled: var(--gray-200);\n  --border-error:    var(--red-200);\n  --border-success:  var(--success-green-300);\n  --border-warning:  var(--orange-200);\n\n  /* ── Radii ─────────────────────────────────────────────────── */\n  --r-2:  2px;\n  --r-4:  4px;\n  --r-8:  8px;\n  --r-12: 12px;\n  --r-16: 16px;\n  --r-20: 20px;\n  --r-24: 24px;\n  --r-32: 32px;\n  --r-40: 40px;\n  --r-full: 999px;\n\n  /* ── Spacing (4-pt base, label = em at 16px body) ──────────── */\n  --s-2:  2px;\n  --s-4:  4px;\n  --s-8:  8px;\n  --s-12: 12px;\n  --s-16: 16px;\n  --s-20: 20px;\n  --s-24: 24px;\n  --s-32: 32px;\n  --s-40: 40px;\n  --s-48: 48px;\n  --s-56: 56px;\n  --s-64: 64px;\n  --s-80: 80px;\n\n  /* ── Elevation / Shadow scale ──────────────────────────────── */\n  --elev-0: none;\n  --elev-1: 0 1px 2px 0 rgba(30, 31, 33, 0.06), 0 1px 1px 0 rgba(30, 31, 33, 0.04);\n  --elev-2: 0 2px 6px 0 rgba(30, 31, 33, 0.08), 0 1px 2px 0 rgba(30, 31, 33, 0.05);\n  --elev-3: 0 4px 12px 0 rgba(30, 31, 33, 0.10), 0 2px 4px 0 rgba(30, 31, 33, 0.06);\n  --elev-4: 0 8px 24px 0 rgba(30, 31, 33, 0.12), 0 4px 8px 0 rgba(30, 31, 33, 0.08);\n  --elev-5: 0 20px 48px 0 rgba(30, 31, 33, 0.16), 0 8px 16px 0 rgba(30, 31, 33, 0.10);\n  --elev-focus: 0 0 0 3px rgba(69, 65, 254, 0.24);\n  --elev-card: 0 4px 20px 1px rgba(0, 0, 0, 0.05);\n\n  /* ── Typography primitives ─────────────────────────────────── */\n  --font-sans:    \"ABC Diatype\", \"IBM Plex Sans\", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;\n  --font-mono:    \"IBM Plex Mono\", ui-monospace, SFMono-Regular, Menlo, monospace;\n  --font-display: \"ABC Diatype\", \"IBM Plex Sans\", system-ui, sans-serif;\n\n  /* Type scale (px) */\n  --fs-10: 10px;\n  --fs-12: 12px;\n  --fs-13: 13px;\n  --fs-14: 14px;  /* default UI body */\n  --fs-16: 16px;  /* reading body */\n  --fs-18: 18px;\n  --fs-20: 20px;\n  --fs-24: 24px;\n  --fs-28: 28px;\n  --fs-32: 32px;\n  --fs-36: 36px;\n  --fs-40: 40px;\n  --fs-48: 48px;\n  --fs-56: 56px;\n  --fs-64: 64px;\n  --fs-96: 96px;\n  --fs-128: 128px; /* marketing hero */\n\n  /* Line heights */\n  --lh-tight:   1.1;\n  --lh-snug:    1.25;\n  --lh-normal:  1.5;\n\n  /* Weights */\n  --fw-regular: 400;\n  --fw-medium:  500;\n  --fw-bold:    700;\n\n  /* Motion */\n  --ease-out:   cubic-bezier(0.22, 0.61, 0.36, 1);\n  --ease-in-out:cubic-bezier(0.65, 0, 0.35, 1);\n  --dur-fast:   120ms;\n  --dur-base:   200ms;\n  --dur-slow:   360ms;\n}\n\n/* Semantic type roles ------------------------------------------- */\n.rd-display-xl { font-family: var(--font-display); font-size: var(--fs-128); line-height: var(--lh-snug); font-weight: var(--fw-regular); color: var(--blue-300); letter-spacing: -0.018em; }\n.rd-display    { font-family: var(--font-display); font-size: var(--fs-56);  line-height: var(--lh-tight); font-weight: var(--fw-bold);    color: var(--navygray-700); letter-spacing: -0.018em; }\n.rd-h1         { font-family: var(--font-sans);    font-size: var(--fs-48);  line-height: 60px;            font-weight: var(--fw-bold);    color: var(--navygray-700); }\n.rd-h2         { font-family: var(--font-sans);    font-size: var(--fs-32);  line-height: var(--lh-tight); font-weight: var(--fw-bold);    color: var(--navygray-700); letter-spacing: -0.018em; }\n.rd-h3         { font-family: var(--font-sans);    font-size: var(--fs-24);  line-height: var(--lh-snug);  font-weight: var(--fw-bold);    color: var(--navygray-700); }\n.rd-h4         { font-family: var(--font-sans);    font-size: var(--fs-20);  line-height: 30px;            font-weight: var(--fw-medium);  color: var(--navygray-700); }\n.rd-h5         { font-family: var(--font-sans);    font-size: var(--fs-18);  line-height: var(--lh-snug);  font-weight: var(--fw-medium);  color: var(--navygray-700); }\n.rd-body-lg    { font-family: var(--font-sans);    font-size: var(--fs-16);  line-height: var(--lh-normal);font-weight: var(--fw-regular); color: var(--text-body); }\n.rd-body       { font-family: var(--font-sans);    font-size: var(--fs-14);  line-height: 20px;            font-weight: var(--fw-regular); color: var(--text-body); }\n.rd-body-medium{ font-family: var(--font-sans);    font-size: var(--fs-14);  line-height: 20px;            font-weight: var(--fw-medium);  color: var(--text-body); }\n.rd-caption    { font-family: var(--font-sans);    font-size: var(--fs-12);  line-height: 16px;            font-weight: var(--fw-regular); color: var(--text-subtext); }\n.rd-overline   { font-family: var(--font-sans);    font-size: var(--fs-10);  line-height: 12px;            font-weight: var(--fw-medium);  color: var(--text-subtext); text-transform: uppercase; letter-spacing: 0.06em; }\n.rd-mono       { font-family: var(--font-mono);    font-size: var(--fs-12);  line-height: 16px;            letter-spacing: 0.32px; color: var(--gray-900); }\n.rd-link       { color: var(--text-link); text-decoration: none; }\n.rd-link:hover { text-decoration: underline; }\n\n/* Minimal base reset for demos --------------------------------- */\n.rd-reset, .rd-reset * { box-sizing: border-box; }\n.rd-reset body         { margin: 0; font-family: var(--font-sans); color: var(--text-body); background: var(--bg-default); -webkit-font-smoothing: antialiased; }\n<\u002Fstyle>\n\n\n<style>\n/*\n  Contact 360 v2 — Adaptive AI workspace\n  ───────────────────────────────────────\n  Three regions below the member strip:\n\n  LEFT   · Live Conversation (persistent, chat-style bubbles)\n  CENTER · AI workspace — handoff brief, active-listening intent,\n           verification, workflow zone (inline), relationship snapshot\n  RIGHT  · Manual-browse drawer (slides in only on demand)\n\n  No persistent right-side guidance — guidance and workflows now live\n  inline in the center, where the agent's eyes already are.\n*/\n:root{\n  --bg: var(--gray-50);\n  --surface: var(--white);\n  --border: var(--gray-200);\n  --border-soft: var(--gray-100);\n  --border-hover: var(--gray-300);\n  --heading: var(--navygray-700);\n  --body: var(--gray-700);\n  --muted: var(--gray-500);\n  --faint: var(--gray-400);\n  --primary: var(--green-200);\n  --primary-hover: var(--green-300);\n  --primary-soft: var(--green-50);\n  --ai: #4541FE;\n  --ai-soft: #EBE9FF;\n  --ai-ring: rgba(69,65,254,.16);\n  --agent: var(--violet-500);   /* outgoing agent bubble */\n  --member-soft: #FFE8DC;        /* member avatar bg */\n  --member-ink: #B84C16;         /* member avatar ink */\n  --warn: var(--orange-200);\n  --warn-soft: var(--orange-50);\n  --err: var(--red-200);\n  --err-soft: var(--red-50);\n  --success: var(--success-green-300);\n  --success-soft: var(--success-green-50);\n  --nav-fill: #1F1A3E;\n  --nav-hover: #2D2759;\n  --topbar-h: 52px;\n  --tabbar-h: 44px;\n  --strip-h: 56px;\n  --bottombar-h: 36px;\n  --rail-w: 56px;\n  --chat-w: 380px;\n  --drawer-w: 360px;\n  --ease: cubic-bezier(.22,.61,.36,1);\n}\n\n*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}\nhtml,body{height:100%;overflow:hidden;font-family:'ABC Diatype',-apple-system,system-ui,sans-serif;color:var(--body);}\nbody{background:var(--bg);font-size:13px;letter-spacing:-.005em;display:flex;flex-direction:column;}\nbutton{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit;}\ninput,textarea{font-family:inherit;outline:0;border:0;background:none;color:inherit;}\n::selection{background:var(--primary-soft);color:var(--heading);}\nsvg{display:block;}\n\n/* ── Top bar ──────────────────────────────────────────────── */\n.topbar{\n  height:var(--topbar-h);flex-shrink:0;\n  display:flex;align-items:center;gap:10px;\n  padding:0 14px;background:var(--white);\n  border-bottom:1px solid var(--border);\n  box-shadow:0 1px 2px rgba(17,48,79,.03);\n}\n.brand-mark{width:30px;height:30px;border-radius:8px;background:var(--green-200);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;letter-spacing:-.02em;}\n.vdiv{width:1px;height:22px;background:var(--border);}\n.chip{\n  display:inline-flex;align-items:center;gap:7px;\n  height:30px;padding:0 12px;border-radius:8px;\n  font-size:12px;font-weight:500;color:var(--body);\n  background:var(--gray-50);border:1px solid var(--border);\n  white-space:nowrap;flex-shrink:0;\n}\n.chip b{font-weight:600;color:var(--heading);margin-left:2px;}\n.chip .dot{width:6px;height:6px;border-radius:50%;}\n.chip.aht{background:var(--orange-50);border-color:#F9D8AA;color:#763418;font-variant-numeric:tabular-nums;}\n.chip.aht .dot{background:var(--orange-200);}\n.chip.status{background:var(--success-green-50);border-color:#B2E5CE;color:var(--success-green-300);}\n.chip.status .dot{background:var(--success-green-200);box-shadow:0 0 0 3px rgba(16,185,129,.18);}\n.icon-btn{\n  width:30px;height:30px;border-radius:8px;\n  display:flex;align-items:center;justify-content:center;\n  color:var(--muted);transition:background .12s var(--ease),color .12s var(--ease);\n}\n.icon-btn:hover{background:var(--gray-100);color:var(--heading);}\n.top-right{margin-left:auto;display:flex;align-items:center;gap:8px;}\n.avatar-mini{\n  width:30px;height:30px;border-radius:50%;\n  background:#1F8A5B;color:#fff;font-size:11px;font-weight:600;\n  display:flex;align-items:center;justify-content:center;letter-spacing:.02em;flex-shrink:0;\n}\n\n/* ── Main ─────────────────────────────────────────────────── */\n.main{flex:1;display:flex;min-height:0;}\n\n/* ── Nav rail ─────────────────────────────────────────────── */\n.navrail{\n  width:var(--rail-w);flex-shrink:0;\n  background:var(--nav-fill);\n  display:flex;flex-direction:column;align-items:center;\n  padding:10px 0;gap:2px;\n}\n.nav-item{\n  width:40px;height:40px;border-radius:10px;\n  display:flex;align-items:center;justify-content:center;\n  color:rgba(255,255,255,.55);position:relative;\n  transition:background .12s var(--ease),color .12s var(--ease);\n}\n.nav-item:hover{background:var(--nav-hover);color:#fff;}\n.nav-item.active{background:#fff;color:var(--violet-500);}\n.nav-item .nbadge{\n  position:absolute;top:5px;right:5px;\n  min-width:14px;height:14px;border-radius:8px;\n  background:var(--red-alert);color:#fff;\n  font-size:9px;font-weight:700;\n  display:flex;align-items:center;justify-content:center;\n  padding:0 3px;border:2px solid var(--nav-fill);\n}\n.nav-spacer{flex:1;}\n\n/* ── Stage ────────────────────────────────────────────────── */\n.stage{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--bg);position:relative;}\n\n/* tab bar */\n.tabbar{\n  height:var(--tabbar-h);flex-shrink:0;\n  display:flex;align-items:flex-end;\n  background:var(--white);\n  border-bottom:1px solid var(--border);\n  padding:0 18px;\n  gap:2px;\n}\n.tab{\n  display:inline-flex;align-items:center;gap:7px;\n  padding:0 14px;height:100%;\n  font-size:13px;font-weight:500;color:var(--muted);\n  border-bottom:2px solid transparent;\n  transition:color .12s var(--ease),border-color .12s var(--ease);\n  position:relative;white-space:nowrap;\n}\n.tab:hover{color:var(--heading);}\n.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;}\n.tab .ai-glyph{width:13px;height:13px;color:var(--primary);}\n.tab-right{margin-left:auto;display:flex;align-items:center;gap:10px;padding-bottom:6px;}\n.tab-complete{\n  height:30px;padding:0 14px;border-radius:8px;\n  background:var(--primary);color:#fff;\n  font-size:12px;font-weight:600;\n  display:inline-flex;align-items:center;gap:7px;\n  transition:background .12s var(--ease);\n}\n.tab-complete:hover{background:var(--primary-hover);}\n.agent-tag{\n  height:30px;padding:0 10px 0 4px;border-radius:8px;\n  border:1px solid var(--border);background:var(--white);\n  display:inline-flex;align-items:center;gap:7px;\n  font-size:12px;color:var(--body);font-weight:500;white-space:nowrap;\n}\n.agent-tag .avatar-mini{width:24px;height:24px;font-size:10px;}\n\n/* ── Member strip (unchanged) ─────────────────────────────── */\n.memberstrip{\n  height:var(--strip-h);flex-shrink:0;\n  background:var(--white);\n  border-bottom:1px solid var(--border);\n  display:flex;align-items:center;padding:0 20px;gap:16px;\n}\n.ms-av{\n  width:36px;height:36px;border-radius:10px;\n  background:linear-gradient(135deg,#11304F 0%,#1F8A5B 100%);\n  color:#fff;font-weight:600;font-size:13px;letter-spacing:.02em;\n  display:flex;align-items:center;justify-content:center;flex-shrink:0;\n}\n.ms-id{display:flex;flex-direction:column;gap:2px;min-width:0;}\n.ms-name{font-size:15px;font-weight:600;color:var(--heading);letter-spacing:-.01em;line-height:1.1;}\n.ms-meta{font-size:11.5px;color:var(--muted);line-height:1.1;font-variant-numeric:tabular-nums;}\n.ms-tags{display:flex;gap:6px;flex-shrink:0;}\n.ms-tag{\n  height:22px;padding:0 8px;border-radius:6px;\n  font-size:10.5px;font-weight:500;letter-spacing:.02em;\n  display:inline-flex;align-items:center;white-space:nowrap;\n  background:var(--gray-100);color:var(--gray-700);\n}\n.ms-tag.gold{background:#FFF7D6;color:#7A5800;}\n.ms-tag.nps{background:var(--success-green-50);color:var(--success-green-300);}\n\n.ms-channel{\n  margin-left:auto;display:inline-flex;align-items:center;gap:6px;\n  height:28px;padding:0 10px;border-radius:7px;\n  background:var(--violet-50);color:var(--violet-500);\n  font-size:11.5px;font-weight:600;letter-spacing:-.005em;\n}\n.ms-channel .ch-dot{width:6px;height:6px;border-radius:50%;background:var(--success-green-200);box-shadow:0 0 0 3px rgba(16,185,129,.16);}\n\n/* ── Workspace: 3 panes ──────────────────────────────────── */\n.workspace{flex:1;display:flex;min-height:0;}\n\n/* ═══ LEFT PANE — Live Conversation ════════════════════════ */\n.chat{\n  width:var(--chat-w);flex-shrink:0;\n  display:flex;flex-direction:column;\n  background:var(--white);\n  border-right:1px solid var(--border);\n}\n.chat-head{\n  padding:14px 18px 10px;display:flex;align-items:center;gap:10px;\n  border-bottom:1px solid var(--border-soft);\n}\n.chat-head-title{font-size:13.5px;font-weight:600;color:var(--heading);letter-spacing:-.01em;}\n.chat-head-sub{font-size:11px;color:var(--muted);margin-top:1px;}\n.chat-listening{\n  margin-left:auto;display:inline-flex;align-items:center;gap:8px;\n  padding:4px 10px 4px 8px;border-radius:14px;\n  background:var(--ai-soft);color:var(--ai);\n  font-size:10.5px;font-weight:600;letter-spacing:-.005em;\n}\n.chat-listening .wave{display:inline-flex;gap:2px;align-items:flex-end;height:11px;}\n.chat-listening .wb{width:2px;background:var(--ai);border-radius:1.5px;animation:wave 1.2s var(--ease) infinite;}\n.chat-listening .wb:nth-child(1){height:30%;animation-delay:0s;}\n.chat-listening .wb:nth-child(2){height:90%;animation-delay:.1s;}\n.chat-listening .wb:nth-child(3){height:60%;animation-delay:.2s;}\n.chat-listening .wb:nth-child(4){height:100%;animation-delay:.3s;}\n.chat-listening .wb:nth-child(5){height:50%;animation-delay:.4s;}\n@keyframes wave{50%{transform:scaleY(.4);}}\n\n.chat-stream{\n  flex:1;overflow-y:auto;padding:14px 16px 6px;\n  display:flex;flex-direction:column;gap:14px;\n  scrollbar-width:thin;scrollbar-color:var(--gray-300) transparent;\n  background:linear-gradient(180deg,#FAFAFB 0%,#F7F7F8 100%);\n}\n.chat-stream::-webkit-scrollbar{width:8px;}\n.chat-stream::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:4px;}\n\n.chat-divider{\n  display:flex;align-items:center;gap:8px;\n  font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;\n  color:var(--faint);padding:6px 0;\n}\n.chat-divider .line{flex:1;height:1px;background:var(--border-soft);}\n\n.handoff-banner{\n  display:flex;gap:10px;align-items:flex-start;\n  padding:10px 12px;border-radius:10px;\n  background:var(--ai-soft);border:1px solid #DCD9FF;\n  margin-bottom:2px;\n}\n.handoff-banner .hb-ic{\n  width:24px;height:24px;border-radius:7px;\n  background:linear-gradient(135deg,#4541FE 0%,#7A75FF 100%);color:#fff;\n  display:flex;align-items:center;justify-content:center;flex-shrink:0;\n}\n.handoff-banner .hb-body{font-size:11.5px;color:#3C36CC;line-height:1.4;flex:1;}\n.handoff-banner .hb-body strong{font-weight:600;}\n\n.bubble-row{display:flex;gap:8px;align-items:flex-end;max-width:88%;}\n.bubble-row.member{align-self:flex-start;}\n.bubble-row.agent{align-self:flex-end;flex-direction:row-reverse;}\n.bubble-row.ai{align-self:flex-start;}\n\n.bubble-av{\n  width:28px;height:28px;border-radius:50%;\n  display:flex;align-items:center;justify-content:center;\n  font-size:10px;font-weight:600;letter-spacing:.02em;flex-shrink:0;\n}\n.bubble-av.member{background:var(--member-soft);color:var(--member-ink);}\n.bubble-av.agent{background:#1F8A5B;color:#fff;}\n.bubble-av.ai{background:linear-gradient(135deg,#4541FE 0%,#7A75FF 100%);color:#fff;}\n\n.bubble-stack{display:flex;flex-direction:column;gap:3px;min-width:0;}\n.bubble-row.agent .bubble-stack{align-items:flex-end;}\n\n.bubble{\n  padding:9px 12px;border-radius:14px;\n  font-size:13px;line-height:1.42;\n  letter-spacing:-.005em;\n  max-width:100%;word-wrap:break-word;\n}\n.bubble.member{background:#fff;color:var(--gray-700);border:1px solid var(--border-soft);border-bottom-left-radius:4px;}\n.bubble.agent{background:var(--agent);color:#fff;border-bottom-right-radius:4px;}\n.bubble.ai{background:var(--ai-soft);color:#3C36CC;border:1px solid #DCD9FF;border-bottom-left-radius:4px;font-size:12px;}\n.bubble.ai strong{font-weight:600;color:#221EB5;}\n.bubble.system{background:transparent;color:var(--muted);font-size:11px;font-style:italic;padding:4px 0;text-align:center;letter-spacing:0;}\n\n.bubble-meta{\n  font-size:10px;color:var(--faint);\n  font-variant-numeric:tabular-nums;\n  padding:0 4px;\n}\n\n.bubble.member.live{\n  background:#fff;color:var(--gray-700);\n  border:1.5px dashed #DCD9FF;\n  position:relative;\n}\n.bubble.member.live::after{\n  content:'';display:inline-block;width:4px;height:14px;background:var(--ai);\n  margin-left:4px;vertical-align:middle;animation:blink 1s infinite;border-radius:2px;\n}\n@keyframes blink{50%{opacity:0;}}\n\n.intent-chip{\n  display:inline-flex;align-items:center;gap:5px;\n  padding:3px 8px;border-radius:10px;\n  background:var(--ai);color:#fff;\n  font-size:10px;font-weight:600;letter-spacing:.02em;\n}\n\n/* Channel bar (above composer) */\n.chan-bar{\n  flex-shrink:0;\n  display:flex;align-items:center;gap:0;\n  padding:8px 12px;border-top:1px solid var(--border-soft);\n  background:var(--white);\n}\n.chan-btn{\n  display:inline-flex;align-items:center;gap:6px;\n  padding:6px 10px;border-radius:7px;\n  font-size:11.5px;font-weight:500;color:var(--muted);\n  transition:background .12s var(--ease),color .12s var(--ease);\n}\n.chan-btn:hover{background:var(--gray-50);color:var(--heading);}\n.chan-btn.active{color:var(--primary);background:var(--primary-soft);font-weight:600;}\n.chan-btn svg{width:13px;height:13px;}\n.chan-sep{width:1px;height:14px;background:var(--border);margin:0 4px;}\n.chan-actions{margin-left:auto;display:flex;gap:2px;}\n\n/* Composer */\n.composer{\n  flex-shrink:0;background:var(--white);\n  border-top:1px solid var(--border-soft);\n  padding:10px 14px 12px;\n  display:flex;flex-direction:column;gap:8px;\n}\n.composer-input{\n  width:100%;min-height:38px;max-height:120px;resize:none;\n  padding:9px 12px;font-size:13px;color:var(--heading);\n  border:1px solid var(--border);background:var(--gray-50);border-radius:9px;\n  line-height:1.4;transition:border-color .12s var(--ease),background .12s var(--ease);\n  font-family:inherit;\n}\n.composer-input:focus{border-color:var(--ai);background:#fff;box-shadow:0 0 0 3px var(--ai-ring);}\n.composer-input::placeholder{color:var(--gray-400);}\n.composer-tools{\n  display:flex;align-items:center;gap:2px;\n}\n.tool-btn{\n  width:28px;height:28px;border-radius:7px;\n  display:flex;align-items:center;justify-content:center;\n  color:var(--muted);\n  transition:background .12s var(--ease),color .12s var(--ease);\n}\n.tool-btn:hover{background:var(--gray-100);color:var(--heading);}\n.tool-btn svg{width:14px;height:14px;}\n.composer-send{\n  margin-left:auto;\n  width:34px;height:34px;border-radius:10px;\n  background:var(--primary);color:#fff;\n  display:flex;align-items:center;justify-content:center;\n  transition:background .12s var(--ease);\n}\n.composer-send:hover{background:var(--primary-hover);}\n.composer-send svg{width:14px;height:14px;}\n\n/* Suggested reply chip (AI) */\n.suggest-row{\n  display:flex;gap:6px;flex-wrap:wrap;\n  padding:0 14px 8px;\n}\n.suggest-pill{\n  display:inline-flex;align-items:center;gap:5px;\n  padding:5px 10px;border-radius:14px;\n  background:#fff;border:1px solid #DCD9FF;\n  color:#3C36CC;font-size:11px;font-weight:500;\n  transition:background .12s var(--ease);\n  max-width:100%;text-align:left;\n}\n.suggest-pill:hover{background:var(--ai-soft);}\n.suggest-pill .sp-ic{flex-shrink:0;}\n\n/* Ambient AI strip (between chat and composer) */\n.ambient-ai{\n  flex-shrink:0;padding:8px 14px 6px;\n  border-top:1px solid var(--border-soft);\n  background:linear-gradient(180deg,#FAFAFF 0%,#fff 100%);\n}\n.amb-row{\n  display:flex;align-items:center;gap:8px;\n  padding:7px 11px;border-radius:9px;\n  background:var(--ai-soft);border:1px solid #DCD9FF;\n}\n.amb-orb{\n  width:18px;height:18px;border-radius:50%;flex-shrink:0;\n  background:linear-gradient(135deg,#4541FE,#7A75FF);color:#fff;\n  display:flex;align-items:center;justify-content:center;\n  animation:ambPulse 2s var(--ease) infinite;\n}\n@keyframes ambPulse{0%,100%{box-shadow:0 0 0 0 rgba(69,65,254,.4);}50%{box-shadow:0 0 0 6px rgba(69,65,254,0);}}\n.amb-text{\n  flex:1;font-size:11.5px;color:#3C36CC;font-weight:500;line-height:1.35;\n  min-width:0;\n}\n.amb-text strong{color:#221EB5;font-weight:600;}\n.amb-conf{\n  font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--ai);\n  background:#fff;padding:2px 7px;border-radius:5px;flex-shrink:0;\n  font-variant-numeric:tabular-nums;\n}\n.amb-conf:empty{display:none;}\n\n.amb-suggests{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}\n.amb-suggests:empty{display:none;}\n.amb-suggest{\n  display:inline-flex;align-items:center;gap:5px;\n  padding:5px 9px;border-radius:13px;\n  background:#fff;border:1px solid #DCD9FF;\n  color:#3C36CC;font-size:11px;font-weight:500;\n  transition:background .12s var(--ease);text-align:left;\n  max-width:100%;line-height:1.3;\n}\n.amb-suggest:hover{background:var(--ai-soft);}\n.amb-suggest .sp-ic{flex-shrink:0;font-size:10px;}\n\n/* ═══ CENTER PANE — Workspace ══════════════════════════════ */\n.center{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;}\n\n/* Sticky active-listening: secIntent inside center-sticky must stay revealed always */\n#secIntent{opacity:1 !important;transform:none !important;margin-bottom:0;}\n.center-sticky{\n  flex-shrink:0;padding:14px 24px 0;background:var(--bg);\n  position:sticky;top:0;z-index:8;\n  border-bottom:1px solid var(--border-soft);\n  transition:padding .25s var(--ease),box-shadow .2s var(--ease);\n}\n\n.center-scroll{\n  flex:1;overflow-y:auto;\n  padding:14px 24px 90px;\n  scrollbar-width:thin;scrollbar-color:var(--gray-300) transparent;\n}\n.center-scroll::-webkit-scrollbar{width:10px;}\n.center-scroll::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:5px;border:2px solid var(--bg);}\n\n/* ═══ SECTION: Handoff Brief ══════════════════════════════ */\n.section{margin-bottom:18px;}\n.section-head{\n  display:flex;align-items:center;gap:10px;\n  margin-bottom:10px;padding:0 2px;\n}\n.section-eyebrow{\n  font-size:10px;font-weight:700;letter-spacing:.08em;\n  text-transform:uppercase;color:var(--faint);\n  display:flex;align-items:center;gap:6px;\n}\n.section-eyebrow .se-dot{width:5px;height:5px;border-radius:50%;background:var(--faint);}\n.section-eyebrow.live .se-dot{background:var(--success-green-200);box-shadow:0 0 0 3px rgba(16,185,129,.16);}\n.section-title{\n  font-size:14px;font-weight:600;color:var(--heading);\n  letter-spacing:-.01em;display:flex;align-items:center;gap:8px;\n}\n.section-aux{margin-left:auto;display:flex;align-items:center;gap:8px;}\n\n/* Compact mode — context cards shrink when workflow is active */\n.section.collapsed > .section-head{margin-bottom:6px;}\n.section.collapsed .handoff-top{padding:10px 16px;gap:10px;cursor:pointer;}\n.section.collapsed .handoff-icon{width:24px;height:24px;border-radius:7px;}\n.section.collapsed .handoff-icon svg{width:11px;height:11px;}\n.section.collapsed .handoff-pre{display:none;}\n.section.collapsed .handoff-title{font-size:12.5px;font-weight:500;color:var(--body);margin-bottom:0;line-height:1.3;}\n.section.collapsed .handoff-prose,\n.section.collapsed .handoff-tags,\n.section.collapsed .handoff-conf{display:none;}\n.section.collapsed .handoff-body::after{\n  content:'view brief';font-size:10.5px;color:var(--ai);font-weight:600;display:block;margin-top:3px;letter-spacing:.02em;\n}\n.section.collapsed .handoff-top:hover{background:var(--gray-50);}\n\n.section.collapsed .verify-head{padding:10px 16px;gap:9px;cursor:pointer;}\n.section.collapsed .verify-head .vh-ic{width:24px;height:24px;border-radius:7px;}\n.section.collapsed .verify-head .vh-ic svg{width:12px;height:12px;}\n.section.collapsed .verify-head .vh-title{font-size:12.5px;font-weight:500;color:var(--body);}\n.section.collapsed .verify-head .vh-sub{display:none;}\n.section.collapsed .verify-head .vh-action{display:none;}\n.section.collapsed .verify-grid,\n.section.collapsed .risk-strip{display:none;}\n.section.collapsed .verify-head:hover{background:var(--gray-50);}\n\n.handoff-card{\n  background:var(--surface);\n  border:1px solid var(--border);\n  border-radius:14px;overflow:hidden;\n}\n.handoff-top{\n  display:flex;align-items:flex-start;gap:14px;\n  padding:18px 20px;\n}\n.handoff-icon{\n  width:36px;height:36px;border-radius:10px;flex-shrink:0;\n  background:linear-gradient(135deg,#4541FE 0%,#7A75FF 100%);\n  color:#fff;display:flex;align-items:center;justify-content:center;\n}\n.handoff-body{flex:1;min-width:0;}\n.handoff-pre{\n  font-size:10px;font-weight:700;letter-spacing:.08em;\n  text-transform:uppercase;color:var(--ai);margin-bottom:4px;\n}\n.handoff-title{\n  font-size:15px;font-weight:600;color:var(--heading);\n  letter-spacing:-.01em;line-height:1.35;margin-bottom:8px;\n  text-wrap:pretty;\n}\n.handoff-prose{\n  font-size:13px;line-height:1.55;color:var(--body);\n  text-wrap:pretty;\n}\n.handoff-prose .hi{\n  background:linear-gradient(180deg,transparent 60%,#FFF7D6 60%);\n  padding:1px 2px;color:var(--heading);font-weight:500;\n}\n.handoff-prose strong{color:var(--heading);font-weight:600;}\n\n.handoff-tags{\n  display:flex;gap:6px;flex-wrap:wrap;padding:0 20px 18px;\n}\n.handoff-tag{\n  display:inline-flex;align-items:center;gap:5px;\n  padding:4px 9px;border-radius:6px;\n  font-size:10.5px;font-weight:500;letter-spacing:.01em;\n  background:var(--gray-50);color:var(--gray-700);\n  border:1px solid var(--border);white-space:nowrap;\n}\n.handoff-tag.ai{background:var(--ai-soft);color:#3C36CC;border-color:#DCD9FF;}\n.handoff-tag.good{background:var(--success-green-50);color:var(--success-green-300);border-color:#B2E5CE;}\n.handoff-tag.warn{background:var(--warn-soft);color:#B84C16;border-color:#F9D8AA;}\n.handoff-tag.err{background:var(--err-soft);color:var(--err);border-color:#F2C0BD;}\n.handoff-tag.escalated{background:#FFF7D6;color:#7A5800;border-color:#F8E6A0;}\n.handoff-tag .htg{font-size:9.5px;}\n\n.handoff-conf{\n  display:flex;align-items:center;gap:10px;\n  padding:10px 20px;background:var(--gray-50);\n  border-top:1px solid var(--border-soft);\n  font-size:11.5px;color:var(--muted);\n}\n.handoff-conf .cf-label{font-weight:500;}\n.handoff-conf .cf-bar{flex:1;max-width:140px;height:5px;background:var(--gray-200);border-radius:3px;overflow:hidden;}\n.handoff-conf .cf-fill{height:100%;background:var(--ai);border-radius:3px;transition:width .6s var(--ease);}\n.handoff-conf .cf-pct{font-weight:600;color:var(--heading);font-variant-numeric:tabular-nums;}\n.handoff-conf .cf-meta{margin-left:auto;}\n\n/* ═══ SECTION: Active Listening / Intent ══════════════════ */\n.intent-card{\n  background:var(--surface);\n  border:1px solid var(--border);border-radius:12px;\n  padding:11px 14px;display:flex;align-items:center;gap:13px;\n  margin-bottom:12px;\n}\n.intent-card .il-orb{\n  width:34px;height:34px;border-radius:50%;flex-shrink:0;\n  background:radial-gradient(circle at 35% 35%,#7A75FF 0%,var(--ai) 70%);\n  position:relative;display:flex;align-items:center;justify-content:center;color:#fff;\n}\n.intent-card .il-orb svg{width:14px;height:14px;}\n.intent-card .il-orb::after{\n  content:'';position:absolute;inset:-4px;border-radius:50%;\n  border:1.5px solid var(--ai);opacity:.3;animation:orbPulse 2s var(--ease) infinite;\n}\n@keyframes orbPulse{0%{transform:scale(.9);opacity:.4;}100%{transform:scale(1.25);opacity:0;}}\n.intent-card.detected .il-orb{background:radial-gradient(circle at 35% 35%,#1F8A5B 0%,#00796B 70%);}\n.intent-card.detected .il-orb::after{border-color:var(--primary);}\n\n.il-body{flex:1;min-width:0;}\n.il-state{\n  font-size:9.5px;font-weight:700;letter-spacing:.08em;\n  text-transform:uppercase;color:var(--ai);margin-bottom:1px;\n}\n.intent-card.detected .il-state{color:var(--primary);}\n.il-title{font-size:13.5px;font-weight:600;color:var(--heading);letter-spacing:-.01em;line-height:1.25;}\n.il-sub{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.35;}\n.il-sub strong{color:var(--heading);font-weight:600;}\n\n.il-entities{\n  display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;\n}\n.il-ent{\n  display:inline-flex;align-items:center;gap:4px;\n  padding:2px 7px;border-radius:5px;\n  background:var(--gray-50);border:1px solid var(--border);\n  font-size:10px;font-weight:500;color:var(--gray-700);white-space:nowrap;\n}\n.il-ent .lk{font-size:9px;color:var(--faint);}\n.il-ent.matched{background:var(--success-green-50);border-color:#B2E5CE;color:var(--success-green-300);}\n.il-ent.matched .lk{color:var(--success);}\n\n.il-conf{flex-shrink:0;text-align:right;}\n.il-conf .il-num{font-size:20px;font-weight:600;color:var(--heading);letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums;}\n.il-conf .il-lbl{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-top:2px;}\n\n/* ═══ SECTION: Verification + Risk ═════════════════════════ */\n.verify-card{\n  background:var(--surface);\n  border:1px solid var(--border);border-radius:14px;overflow:hidden;\n}\n.verify-head{\n  display:flex;align-items:center;gap:11px;\n  padding:14px 18px;border-bottom:1px solid var(--border-soft);\n}\n.verify-head .vh-ic{\n  width:32px;height:32px;border-radius:9px;flex-shrink:0;\n  background:var(--primary-soft);color:var(--primary);\n  display:flex;align-items:center;justify-content:center;\n}\n.verify-head.partial .vh-ic{background:var(--warn-soft);color:#B84C16;}\n.verify-head.verified .vh-ic{background:var(--success-green-50);color:var(--success);}\n.verify-head .vh-body{flex:1;min-width:0;}\n.verify-head .vh-title{font-size:13.5px;font-weight:600;color:var(--heading);letter-spacing:-.01em;}\n.verify-head .vh-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}\n.verify-head .vh-badge{\n  display:inline-flex;align-items:center;gap:5px;\n  padding:4px 10px;border-radius:6px;\n  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;\n  background:var(--warn-soft);color:#B84C16;\n}\n.verify-head.verified .vh-badge{background:var(--success-green-50);color:var(--success);}\n.verify-head .vh-action{\n  height:30px;padding:0 12px;border-radius:8px;\n  background:var(--primary);color:#fff;\n  font-size:12px;font-weight:600;\n  display:inline-flex;align-items:center;gap:6px;\n  transition:background .12s var(--ease);\n}\n.verify-head .vh-action:hover{background:var(--primary-hover);}\n\n.verify-grid{\n  display:grid;grid-template-columns:1fr 1fr;gap:0;\n  border-bottom:1px solid var(--border-soft);\n}\n.verify-col{\n  padding:14px 18px;display:flex;flex-direction:column;gap:9px;\n}\n.verify-col + .verify-col{border-left:1px solid var(--border-soft);}\n.verify-col-lbl{\n  font-size:10px;font-weight:700;letter-spacing:.08em;\n  text-transform:uppercase;color:var(--faint);\n}\n.verify-method{\n  display:flex;align-items:center;gap:9px;\n  font-size:12.5px;\n}\n.verify-method .vm-st{\n  width:18px;height:18px;border-radius:50%;flex-shrink:0;\n  display:flex;align-items:center;justify-content:center;font-size:10px;\n}\n.verify-method .vm-st.done{background:var(--success-green-200);color:#fff;}\n.verify-method .vm-st.pending{background:#fff;border:1.5px dashed var(--gray-300);color:var(--muted);}\n.verify-method .vm-st.skip{background:var(--gray-100);color:var(--muted);}\n.verify-method .vm-name{color:var(--heading);font-weight:500;flex:1;}\n.verify-method .vm-meta{font-size:11px;colo rt;gap:11px;\n  padding:12px 14px;border-radius:11px;\n  background:var(--warn-soft);border:1px solid #F9D8AA;\n  margin-bottom:14px;\n}\n.gate.err{background:var(--err-soft);border-color:#F2C0BD;}\n.gate.info{background:var(--ai-soft);border-color:#DCD9FF;}\n.gate.success{background:var(--success-green-50);border-color:#B2E5CE;}\n.gate .g-ic{width:26px;height:26px;border-radius:7px;background:var(--warn);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.gate.err .g-ic{background:var(--err);}\n.gate.info .g-ic{background:var(--ai);}\n.gate.success .g-ic{background:var(--success);}\n.gate .g-body{font-size:12.5px;color:#7A4100;line-height:1.45;flex:1;}\n.gate.err .g-body{color:var(--red-300);}\n.gate.info .g-body{color:#3C36CC;}\n.gate.success .g-body{color:var(--success);}\n.gate .g-body strong{font-weight:600;}\n\n/* Success state */\n.success-screen{\n  display:flex;flex-direction:column;align-items:center;text-align:center;\n  padding:14px 8px 18px;\n}\n.success-badge{\n  width:72px;height:72px;border-radius:50%;background:var(--primary-soft);\n  display:flex;align-items:center;justify-content:center;\n  margin-bottom:18px;position:relative;animation:successPop .5s var(--ease);\n}\n.success-badge.danger{background:var(--err-soft);}\n.success-badge::before{\n  content:'';position:absolute;inset:-6px;border-radius:50%;\n  border:2px solid var(--primary);opacity:.2;animation:successRing .9s var(--ease) forwards;\n}\n.success-badge.danger::before{border-color:var(--err);}\n@keyframes successPop{0%{transform:scale(.5);opacity:0;}60%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}\n@keyframes successRing{0%{transform:scale(.6);opacity:.5;}100%{transform:scale(1.7);opacity:0;}}\n.success-badge .ck{color:var(--primary);}\n.success-badge.danger .ck{color:var(--err);}\n.success-title{font-size:20px;font-weight:600;color:var(--heading);letter-spacing:-.015em;margin-bottom:6px;}\n.success-sub{font-size:13.5px;color:var(--muted);line-height:1.5;margin-bottom:18px;max-width:380px;text-wrap:pretty;}\n.success-receipt{width:100%;max-width:440px;background:var(--gray-50);border:1px solid var(--border-soft);border-radius:11px;padding:6px 18px;margin-bottom:14px;text-align:left;}\n.success-actions{display:flex;gap:8px;width:100%;max-width:440px;}\n.success-actions .btn{flex:1;justify-content:center;height:38px;}\n\n/* Processing */\n.processing-screen{display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 8px 12px;}\n.proc-spinner{\n  width:48px;height:48px;border-radius:50%;\n  border:3px solid var(--gray-200);border-top-color:var(--primary);\n  animation:spin .9s linear infinite;margin-bottom:18px;\n}\n@keyframes spin{to{transform:rotate(360deg);}}\n.proc-title{font-size:15px;font-weight:600;color:var(--heading);margin-bottom:4px;}\n.proc-sub{font-size:12px;color:var(--muted);}\n\n/* Checkbox row */\n.check-row{\n  display:flex;align-items:center;gap:11px;padding:12px 14px;\n  border-radius:10px;border:1.5px solid var(--border);background:#fff;\n  cursor:pointer;transition:border-color .12s var(--ease),background .12s var(--ease);\n  margin-bottom:8px;\n}\n.check-row:hover{border-color:var(--border-hover);}\n.check-row.checked{background:var(--primary-soft);border-color:var(--primary);}\n.check-row .ckbox{\n  width:18px;height:18px;border-radius:5px;border:1.5px solid var(--gray-300);\n  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;\n  transition:background .12s var(--ease),border-color .12s var(--ease);\n}\n.check-row.checked .ckbox{background:var(--primary);border-color:var(--primary);}\n.check-row .ck-body{font-size:13px;color:var(--body);line-height:1.4;}\n.check-row .ck-body strong{display:block;color:var(--heading);font-weight:600;}\n\n/* Timeline (suspicious tx) */\n.timeline{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}\n.tl-row{\n  display:flex;align-items:center;gap:12px;\n  padding:12px 14px;border-radi
